<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" fill="none">
  <defs>
    <linearGradient id="termbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="700" height="380" fill="url(#termbg)" rx="12"/>

  <!-- Title bar -->
  <rect width="700" height="36" fill="#0d1117" rx="12"/>
  <rect y="24" width="700" height="12" fill="#0d1117"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="350" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Claude Code</text>

  <!-- User prompt -->
  <text x="20" y="68" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="#7ee787">$</text>
  <text x="36" y="68" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="#e6edf3"> What port does Express default to?</text>

  <!-- Claude response -->
  <text x="20" y="100" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="#c9d1d9">Express defaults to port 3000. The app.listen()</text>
  <text x="20" y="118" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="#c9d1d9">method was added in Express 3.0 and accepts a</text>
  <text x="20" y="136" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="#c9d1d9">callback as its second argument.</text>

  <!-- User verify -->
  <text x="20" y="168" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="#7ee787">$</text>
  <text x="36" y="168" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="#e6edf3"> verify this</text>

  <!-- Shield report header -->
  <text x="20" y="200" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#58a6ff">Truth Shield Report (v3)</text>
  <text x="20" y="218" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" fill="#8b949e">Claims checked: 3 · Verified: 2 · Contradicted: 1</text>

  <!-- Table header -->
  <text x="20" y="246" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" fill="#8b949e">#  Claim                             Verdict</text>
  <line x1="20" y1="252" x2="680" y2="252" stroke="#30363d" stroke-width="1"/>

  <!-- Row 1: Verified -->
  <text x="20" y="270" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">1  Express defaults to port 3000</text>
  <rect x="490" y="258" width="86" height="18" rx="3" fill="#238636" opacity="0.3"/>
  <text x="500" y="271" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#3fb950">VERIFIED</text>

  <!-- Row 2: Contradicted (highlighted) -->
  <rect x="14" y="280" width="672" height="22" rx="3" fill="#da3633" opacity="0.08"/>
  <text x="20" y="296" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">2  app.listen() added in Express 3.0</text>
  <rect x="490" y="284" width="128" height="18" rx="3" fill="#da3633" opacity="0.3"/>
  <text x="500" y="297" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#f85149">CONTRADICTED</text>

  <!-- Row 3: Verified -->
  <text x="20" y="322" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">3  Accepts callback as second arg</text>
  <rect x="490" y="310" width="86" height="18" rx="3" fill="#238636" opacity="0.3"/>
  <text x="500" y="323" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#3fb950">VERIFIED</text>

  <!-- Correction -->
  <text x="20" y="354" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" fill="#f0883e">Correction: app.listen() existed since Express 1.x</text>
  <text x="20" y="370" font-family="'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" fill="#f0883e">Express 3.0 removed bundled middleware, not added listen()</text>
</svg>

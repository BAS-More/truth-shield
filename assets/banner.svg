<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(80, 75)" filter="url(#glow)">
    <path d="M75 0 L150 40 L150 100 C150 140 120 170 75 190 C30 170 0 140 0 100 L0 40 Z"
          fill="url(#shield)" opacity="0.15" stroke="url(#shield)" stroke-width="2"/>
    <!-- Checkmark inside shield -->
    <path d="M50 95 L70 115 L110 70" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  </g>

  <!-- Title -->
  <text x="280" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">
    Truth Shield
  </text>

  <!-- Version badge -->
  <rect x="630" y="90" width="72" height="32" rx="16" fill="#22d3ee" opacity="0.2" stroke="#22d3ee" stroke-width="1"/>
  <text x="666" y="112" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#22d3ee" text-anchor="middle">v4.2</text>

  <!-- Tagline -->
  <text x="280" y="165" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#94a3b8" letter-spacing="0.5">
    Stop Claude from lying to you.
  </text>

  <!-- Stats bar -->
  <g transform="translate(280, 200)">
    <!-- 100% Recall -->
    <rect x="0" y="0" width="145" height="36" rx="8" fill="#059669" opacity="0.15" stroke="#059669" stroke-width="1"/>
    <text x="14" y="24" font-family="monospace" font-size="14" font-weight="700" fill="#34d399">100% Recall</text>

    <!-- 47 Tests -->
    <rect x="160" y="0" width="120" height="36" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
    <text x="174" y="24" font-family="monospace" font-size="14" font-weight="700" fill="#a78bfa">47/47 Tests</text>

    <!-- 0 Dependencies -->
    <rect x="295" y="0" width="165" height="36" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="309" y="24" font-family="monospace" font-size="14" font-weight="700" fill="#fbbf24">0 Dependencies</text>

    <!-- 30s Install -->
    <rect x="475" y="0" width="140" height="36" rx="8" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="489" y="24" font-family="monospace" font-size="14" font-weight="700" fill="#22d3ee">30s Install</text>
  </g>

  <!-- Decorative line -->
  <rect x="280" y="250" width="600" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>
